# =============================================================================
# 05_demo_builder - Demo Environment Configuration
# csw-security-toolkit / Beatrice Nnaji
#
# Fill in your values. All secrets come from .env, never from this file.
# This file is safe to commit to Git.
# =============================================================================

csw:
  tenant: "kubuspov.tetrationcloud.com"
  root_scope_name: "KUBUSPOV"

ssh:
  key_path: "~/.ssh/csw_lab_key"
  user: "beghorra"
  connect_timeout: 10

agent_installer: "./tetration_installer.sh"

vms:
  - ip: "10.1.42.11"
    hostname: "beghorra-tsa-01"
    role: "app"
    env: "lab-demo"
    ssh_user: "beghorra"
    description: "Simulated application tier (the attacker foothold)"

  - ip: "10.1.42.15"
    hostname: "beghorra-tsa-05"
    role: "db"
    env: "lab-demo"
    ssh_user: "beghorra"
    description: "Simulated database tier (the blast radius target)"

demo:
  scope_name: "BRD-Lab"
  parent_scope_name: "Applications"
  workspace_name: "Blast Radius Demo Policy"
  allowed_port: 5432 # app -> db
  mgmt_ip: "10.8.243.16" #Duslab FW
  mgmt_port: 22
  traffic_interval: 5
  probe_ports:
    - 5432
    - 8080
    - 6379
    - 3306
    - 22
    - 80
